<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOP — Gestão de Organização Pedagógica</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #2B7FD4; --blue-dark: #1a5fa8; --blue-light: #ddeeff;
    --blue-hover: #e8f2fc; --green: #2d7a4f; --sidebar-w: 220px;
    --sidebar-w-collapsed: 60px; --text: #1a1a2e; --muted: #6b7280;
    --border: #e5e7eb; --bg: #f4f6fb; --white: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

  .sidebar { width: var(--sidebar-w); background: var(--white); display: flex; flex-direction: column; border-right: 1px solid var(--border); transition: width 0.25s ease; overflow: hidden; flex-shrink: 0; box-shadow: 2px 0 8px rgba(0,0,0,0.04); z-index: 10; }
  .sidebar.collapsed { width: var(--sidebar-w-collapsed); }
  .sidebar-header { background: var(--blue); padding: 0 14px; height: 52px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .hamburger { background: none; border: none; color: white; cursor: pointer; font-size: 16px; padding: 4px; border-radius: 4px; transition: background 0.15s; flex-shrink: 0; }
  .hamburger:hover { background: rgba(255,255,255,0.15); }
  .logo-area { display: flex; align-items: center; gap: 8px; overflow: hidden; }
  .logo-icon { width: 28px; height: 28px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-icon i { color: var(--blue); font-size: 14px; }
  .logo-text { font-size: 20px; font-weight: 800; color: white; letter-spacing: 1px; white-space: nowrap; transition: opacity 0.2s; }
  .sidebar.collapsed .logo-text { opacity: 0; }
  .nav { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; gap: 4px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background 0.15s, color 0.15s; color: var(--muted); font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; user-select: none; }
  .nav-item i { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-item span { transition: opacity 0.2s; }
  .sidebar.collapsed .nav-item span { opacity: 0; }
  .nav-item:hover { background: var(--blue-hover); color: var(--blue); }
  .nav-item.active { background: var(--blue-light); color: var(--blue); }
  .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .school-logo { display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; transition: opacity 0.2s; }
  .sidebar.collapsed .school-logo { opacity: 0; }
  .school-logo-circle { width: 46px; height: 46px; border: 2px solid var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .school-logo-circle i { color: var(--blue); font-size: 18px; }
  .school-name { font-size: 9px; color: var(--muted); font-weight: 700; line-height: 1.3; max-width: 140px; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--blue); height: 52px; display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; flex-shrink: 0; }
  .avatar-btn { width: 36px; height: 36px; background: var(--green); border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); color: white; font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; transition: border-color 0.15s; }
  .avatar-btn:hover { border-color: white; }

  .dropdown { position: absolute; top: 52px; right: 16px; background: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.14); min-width: 190px; padding: 8px; z-index: 100; display: none; animation: fadeIn 0.15s ease; }
  .dropdown.open { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .dropdown-header { display: flex; align-items: center; gap: 10px; padding: 8px 10px 10px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
  .dropdown-avatar { width: 30px; height: 30px; background: var(--green); border-radius: 50%; color: white; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .dropdown-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text); transition: background 0.12s; }
  .dropdown-item:hover { background: var(--blue-hover); color: var(--blue); }
  .dropdown-item.danger { color: #dc2626; }
  .dropdown-item.danger:hover { background: #fef2f2; }
  .dropdown-item i { width: 16px; text-align: center; font-size: 13px; }

  .content { flex: 1; overflow-y: auto; padding: 28px; }
  .page { display: none; }
  .page.active { display: block; }

  .profile-card { background: white; border-radius: 16px; box-shadow: var(--shadow); padding: 24px 28px; max-width: 680px; margin-bottom: 20px; }
  .profile-label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .profile-top { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .profile-avatar { width: 52px; height: 52px; background: var(--green); border-radius: 50%; color: white; font-size: 22px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .profile-name { font-size: 17px; font-weight: 700; color: var(--blue); }
  .profile-section-title { font-size: 12px; font-weight: 800; color: var(--blue); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .profile-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .profile-field label { display: block; font-size: 11px; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
  .profile-field span { font-size: 13px; font-weight: 600; color: var(--text); }
  .logout-btn { display: inline-flex; align-items: center; gap: 8px; margin-top: 20px; padding: 9px 18px; background: none; border: 1px solid var(--border); border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: #dc2626; cursor: pointer; transition: background 0.12s, border-color 0.12s; }
  .logout-btn:hover { background: #fef2f2; border-color: #fca5a5; }

  .schedule-card { background: white; border-radius: 16px; box-shadow: var(--shadow); padding: 24px 28px; max-width: 680px; }
  .schedule-title { font-size: 13px; font-weight: 800; color: var(--blue); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .today-date { font-size: 11px; color: var(--muted); font-weight: 600; margin-left: auto; text-transform: none; letter-spacing: 0; }
  .schedule-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; color: var(--muted); gap: 10px; border: 2px dashed var(--border); border-radius: 10px; }
  .schedule-placeholder i { font-size: 32px; opacity: 0.3; }
  .schedule-placeholder p { font-size: 13px; font-weight: 600; opacity: 0.6; }

  .agenda-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .agenda-header h2 { font-size: 20px; font-weight: 800; color: var(--text); }
  .agenda-card { background: white; border-radius: 16px; box-shadow: var(--shadow); padding: 24px 28px; }
  .agenda-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 32px; color: var(--muted); gap: 12px; }
  .agenda-placeholder i { font-size: 48px; opacity: 0.2; }
  .agenda-placeholder p { font-size: 14px; font-weight: 600; opacity: 0.5; }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
      <span class="logo-text">GOP</span>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-item active" id="nav-inicio" onclick="showPage('inicio')">
      <i class="fas fa-home"></i><span>Início</span>
    </div>
    <div class="nav-item" id="nav-agenda" onclick="showPage('agenda')">
      <i class="fas fa-calendar-alt"></i><span>Agenda</span>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="school-logo">
      <div class="school-logo-circle"><i class="fas fa-school"></i></div>
      <div class="school-name">Escola Profissional<br>Bento de Jesus Caraça</div>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div style="position:relative;">
      <div class="avatar-btn" onclick="toggleDropdown()">?</div>
      <div class="dropdown" id="dropdown">
        <div class="dropdown-header">
          <div class="dropdown-avatar">?</div>
          <span class="dropdown-name">Nome do Professor</span>
        </div>
        <div class="dropdown-item" onclick="showPage('perfil');closeDropdown()">
          <i class="fas fa-user"></i> Ver Perfil
        </div>
        <div class="dropdown-item danger">
          <i class="fas fa-sign-out-alt"></i> Sair
        </div>
      </div>
    </div>
  </div>

  <div class="content">

    <div class="page active" id="page-inicio">
      <div class="schedule-card">
        <div class="schedule-title">
          Horário de Hoje
          <span class="today-date" id="today-date"></span>
        </div>
        <div class="schedule-placeholder">
          <p>Sem aulas agendadas para hoje</p>
        </div>
      </div>
    </div>

    <div class="page" id="page-perfil">
      <div class="profile-card">
        <div class="profile-label">Nome de utilizador</div>
        <div class="profile-top">
          <div class="profile-avatar">?</div>
          <div class="profile-name">Nome do Professor</div>
        </div>
        <div class="profile-section-title">Conta de Professor GOP</div>
        <div class="profile-grid">
          <div class="profile-field">
            <label>Nome</label>
            <span>—</span>
          </div>
          <div class="profile-field">
            <label>Data de Nascimento</label>
            <span>—</span>
          </div>
          <div class="profile-field">
            <label>Disciplinas atribuídas</label>
            <span>—</span>
          </div>
          <div class="profile-field" style="grid-column:1/-1;">
            <label>Turmas atribuídas</label>
            <span>—</span>
          </div>
        </div>
        <button class="logout-btn">Sair</button>
      </div>
    </div>

    <div class="page" id="page-agenda">
      <div class="agenda-header">
        <h2><i class="fas fa-calendar-alt" style="color:var(--blue);margin-right:10px;"></i>Agenda</h2>
      </div>
      <div class="agenda-card">
        <div class="agenda-placeholder">
          <i class="fas fa-calendar-plus"></i>
          <p>Sem atividades na agenda</p>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('pt-PT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const navEl = document.getElementById('nav-' + page);
    if (navEl) navEl.classList.add('active');
  }
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
  function toggleDropdown() { document.getElementById('dropdown').classList.toggle('open'); }
  function closeDropdown() { document.getElementById('dropdown').classList.remove('open'); }
  document.addEventListener('click', e => {
    if (!e.target.closest('.avatar-btn') && !e.target.closest('.dropdown')) closeDropdown();
  });
</script>
</body>
</html>
